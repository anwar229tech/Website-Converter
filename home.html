
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Studio - Chat, Gambar, Upload</title>
    <link rel="stylesheet" href="https://unpkg.com/@bytescale/upload-widget@5.4.4/dist/upload-widget.min.css" />
    <style>
        /* ---------- CSS (sama seperti sebelumnya, saya singkat) ---------- */
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',system-ui,sans-serif; }
        body { background:#0b0b16; display:flex; justify-content:center; align-items:center; min-height:100vh; padding:20px; }
        .app-container { width:100%; max-width:900px; height:95vh; max-height:800px; background:rgba(255,255,255,0.04); backdrop-filter:blur(14px); border-radius:32px; border:1px solid rgba(255,255,255,0.06); box-shadow:0 20px 60px rgba(0,0,0,0.7); display:flex; flex-direction:column; overflow:hidden; }
        .header { padding:16px 24px; border-bottom:1px solid rgba(255,255,255,0.05); background:rgba(0,0,0,0.25); display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px; }
        .header h1 { color:#fff; font-size:20px; font-weight:600; display:flex; align-items:center; gap:10px; }
        .header h1 span { background:linear-gradient(135deg,#7c3aed,#3b82f6); padding:2px 12px; border-radius:30px; font-size:11px; font-weight:500; color:#fff; }
        .header-actions { display:flex; gap:10px; }
        .header-actions button { background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.08); color:#c0c0d8; padding:6px 16px; border-radius:30px; font-size:13px; cursor:pointer; transition:0.2s; }
        .header-actions button:hover { background:rgba(124,58,237,0.2); border-color:#7c3aed; color:#fff; }
        .header-actions button.active { background:rgba(124,58,237,0.25); border-color:#7c3aed; color:#fff; }
        .tab-content { flex:1; display:none; flex-direction:column; overflow:hidden; padding:16px 20px 0; }
        .tab-content.active { display:flex; }
        .chat-messages { flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:14px; padding-right:4px; scroll-behavior:smooth; }
        .chat-messages::-webkit-scrollbar { width:4px; }
        .chat-messages::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.15); border-radius:10px; }
        .message { max-width:82%; padding:12px 18px; border-radius:20px; font-size:14.5px; line-height:1.6; word-wrap:break-word; animation:fadeSlide 0.25s ease-out; }
        .message.user { align-self:flex-end; background:linear-gradient(135deg,#3b82f6,#8b5cf6); color:#fff; border-bottom-right-radius:4px; }
        .message.bot { align-self:flex-start; background:rgba(255,255,255,0.07); color:#e4e4f0; border-bottom-left-radius:4px; border:1px solid rgba(255,255,255,0.04); }
        .message.bot strong { color:#a78bfa; }
        .message img { max-width:100%; border-radius:12px; margin-top:8px; border:1px solid rgba(255,255,255,0.1); }
        @keyframes fadeSlide { 0% { opacity:0; transform:translateY(8px); } 100% { opacity:1; transform:translateY(0); } }
        .typing-indicator { align-self:flex-start; background:rgba(255,255,255,0.05); padding:12px 20px; border-radius:20px; border-bottom-left-radius:4px; display:none; gap:5px; border:1px solid rgba(255,255,255,0.04); }
        .typing-indicator.show { display:flex; }
        .typing-indicator span { width:7px; height:7px; background:#a78bfa; border-radius:50%; animation:typingBounce 1.4s infinite both; }
        .typing-indicator span:nth-child(2) { animation-delay:0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay:0.4s; }
        @keyframes typingBounce { 0%,60%,100% { transform:translateY(0); opacity:0.4; } 30% { transform:translateY(-8px); opacity:1; } }
        .chat-input-area { padding:12px 0 16px; display:flex; gap:10px; align-items:flex-end; }
        .chat-input-area textarea { flex:1; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.07); border-radius:18px; padding:12px 18px; color:#fff; font-size:14px; resize:none; outline:none; transition:0.2s; max-height:100px; line-height:1.5; }
        .chat-input-area textarea::placeholder { color:#6a6a82; }
        .chat-input-area textarea:focus { border-color:#7c3aed; background:rgba(255,255,255,0.07); }
        .chat-input-area button { background:linear-gradient(135deg,#7c3aed,#3b82f6); border:none; border-radius:30px; padding:12px 24px; color:#fff; font-weight:600; font-size:14px; cursor:pointer; transition:0.2s; white-space:nowrap; box-shadow:0 4px 15px rgba(124,58,237,0.25); }
        .chat-input-area button:hover { transform:scale(1.02); }
        .chat-input-area button:disabled { opacity:0.5; cursor:not-allowed; transform:scale(1); }
        .image-panel { flex:1; display:flex; flex-direction:column; gap:14px; overflow:hidden; }
        .image-panel .prompt-area { display:flex; gap:10px; }
        .image-panel .prompt-area input { flex:1; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.07); border-radius:18px; padding:12px 18px; color:#fff; font-size:14px; outline:none; transition:0.2s; }
        .image-panel .prompt-area input::placeholder { color:#6a6a82; }
        .image-panel .prompt-area input:focus { border-color:#7c3aed; }
        .image-panel .prompt-area button { background:linear-gradient(135deg,#7c3aed,#3b82f6); border:none; border-radius:30px; padding:12px 28px; color:#fff; font-weight:600; font-size:14px; cursor:pointer; transition:0.2s; box-shadow:0 4px 15px rgba(124,58,237,0.25); }
        .image-panel .prompt-area button:hover { transform:scale(1.02); }
        .image-panel .prompt-area button:disabled { opacity:0.5; cursor:not-allowed; transform:scale(1); }
        .image-result { flex:1; background:rgba(255,255,255,0.03); border-radius:20px; border:1px dashed rgba(255,255,255,0.08); display:flex; flex-direction:column; align-items:center; justify-content:center; overflow:hidden; min-height:200px; position:relative; }
        .image-result img { max-width:100%; max-height:100%; object-fit:contain; border-radius:16px; }
        .image-result .placeholder { color:#6a6a82; font-size:15px; text-align:center; padding:20px; }
        .image-result .placeholder .icon { font-size:48px; display:block; margin-bottom:10px; }
        .image-result .loader { display:none; width:40px; height:40px; border:3px solid rgba(255,255,255,0.05); border-top:3px solid #a78bfa; border-radius:50%; animation:spin 0.9s linear infinite; }
        .image-result .loader.show { display:block; }
        @keyframes spin { 0% { transform:rotate(0deg); } 100% { transform:rotate(360deg); } }
        .upload-panel { flex:1; display:flex; flex-direction:column; gap:16px; overflow-y:auto; }
        .upload-panel .upload-area { background:rgba(255,255,255,0.03); border:2px dashed rgba(255,255,255,0.08); border-radius:24px; padding:30px 20px; text-align:center; color:#8a8aa2; transition:0.3s; min-height:150px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; }
        .upload-panel .upload-area.dragover { border-color:#7c3aed; background:rgba(124,58,237,0.05); }
        .upload-panel .upload-area .icon { font-size:42px; }
        .upload-panel .upload-area .btn-upload { background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1); border-radius:30px; padding:10px 28px; color:#fff; font-size:14px; cursor:pointer; transition:0.2s; }
        .upload-panel .upload-area .btn-upload:hover { background:rgba(124,58,237,0.2); border-color:#7c3aed; }
        .upload-panel .file-list { display:flex; flex-direction:column; gap:10px; }
        .upload-panel .file-item { background:rgba(255,255,255,0.04); border-radius:16px; padding:14px 18px; display:flex; align-items:center; gap:14px; border:1px solid rgba(255,255,255,0.04); }
        .upload-panel .file-item .info { flex:1; color:#d0d0e0; font-size:14px; }
        .upload-panel .file-item .info .name { font-weight:500; }
        .upload-panel .file-item .info .size { font-size:12px; color:#6a6a82; }
        .upload-panel .file-item .status { font-size:13px; padding:4px 14px; border-radius:30px; background:rgba(52,211,153,0.15); color:#34d399; }
        .upload-panel .file-item .status.error { background:rgba(239,68,68,0.15); color:#f87171; }
        .upload-panel .file-item img.preview { width:48px; height:48px; object-fit:cover; border-radius:10px; border:1px solid rgba(255,255,255,0.06); }
        @media (max-width:600px) { .app-container { height:98vh; max-height:98vh; border-radius:20px; } .header { padding:12px 16px; } .header h1 { font-size:17px; } .header-actions button { font-size:12px; padding:4px 12px; } .tab-content { padding:12px 14px 0; } .message { max-width:90%; font-size:13.5px; padding:10px 14px; } .image-panel .prompt-area { flex-wrap:wrap; } .image-panel .prompt-area button { width:100%; justify-content:center; } .upload-panel .upload-area { padding:20px 14px; min-height:120px; } }
    </style>
</head>
<body>

    <div class="app-container">

        <div class="header">
            <h1>🧠 AI Studio <span>v2.0</span></h1>
            <div class="header-actions">
                <button class="active" data-tab="tabChat">💬 Chat</button>
                <button data-tab="tabImage">🖼️ Gambar</button>
                <button data-tab="tabUpload">📁 Upload</button>
            </div>
        </div>

        <!-- TAB CHAT -->
        <div class="tab-content active" id="tabChat">
            <div class="chat-messages" id="chatMessages">
                <div class="message bot"><strong>Halo! 👋</strong><br />Saya asisten AI. Tanya apa saja, atau pilih tab lain untuk generate gambar atau upload file!</div>
            </div>
            <div class="typing-indicator" id="typingIndicator"><span></span><span></span><span></span></div>
            <div class="chat-input-area">
                <textarea id="userInput" rows="1" placeholder="Ketik pesan..." onkeydown="handleEnter(event)"></textarea>
                <button id="sendBtn" onclick="sendMessage()">Kirim →</button>
            </div>
        </div>

        <!-- TAB GAMBAR -->
        <div class="tab-content" id="tabImage">
            <div class="image-panel">
                <div class="prompt-area">
                    <input id="imagePrompt" type="text" placeholder="Deskripsikan gambar (pakai bahasa Inggris lebih baik)..." />
                    <button id="generateBtn" onclick="generateImage()">✨ Generate</button>
                </div>
                <div class="image-result" id="imageResult">
                    <div class="loader" id="imageLoader"></div>
                    <div class="placeholder" id="imagePlaceholder">
                        <span class="icon">🎨</span>
                        Ketik deskripsi lalu klik Generate
                    </div>
                </div>
            </div>
        </div>

        <!-- TAB UPLOAD -->
        <div class="tab-content" id="tabUpload">
            <div class="upload-panel">
                <div class="upload-area" id="dropZone">
                    <span class="icon">📤</span>
                    <p>Seret &amp; jatuhkan file di sini, atau</p>
                    <button class="btn-upload" id="uploadBtn">Pilih File</button>
                    <p style="font-size:13px; color:#6a6a82;">Maks. 10MB · Gambar / Dokumen</p>
                    <input type="file" id="fileInput" multiple style="display:none" />
                </div>
                <div class="file-list" id="fileList"></div>
            </div>
        </div>

    </div>

    <script src="https://unpkg.com/@bytescale/upload-widget@5.4.4/dist/upload-widget.min.js"></script>
    <script>
        // ================================================================
        // 1. KONFIGURASI API
        // ================================================================
        const HF_API_KEY = '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';
        const BYTESCALE_API_KEY = 'public_YOUR_BYTESCALE_KEY_HERE';
        const GEMINI_API_KEY = 'YOUR_GEMINI_API_KEY_HERE';

        // ================================================================
        // 2. TAB SWITCHING
        // ================================================================
        const tabButtons = document.querySelectorAll('[data-tab]');
        const tabContents = {
            tabChat: document.getElementById('tabChat'),
            tabImage: document.getElementById('tabImage'),
            tabUpload: document.getElementById('tabUpload'),
        };
        tabButtons.forEach((btn) => {
            btn.addEventListener('click', () => {
                tabButtons.forEach((b) => b.classList.remove('active'));
                btn.classList.add('active');
                Object.keys(tabContents).forEach((key) => {
                    tabContents[key].classList.toggle('active', key === btn.dataset.tab);
                });
                if (btn.dataset.tab === 'tabChat') document.getElementById('userInput').focus();
                else if (btn.dataset.tab === 'tabImage') document.getElementById('imagePrompt').focus();
            });
        });

        // ================================================================
        // 3. CHAT (sama)
        // ================================================================
        const chatMessages = document.getElementById('chatMessages');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const typingIndicator = document.getElementById('typingIndicator');

        function addMessage(text, sender, imageUrl = null) {
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            div.innerHTML = text.replace(/\n/g, '<br>');
            if (imageUrl) div.innerHTML += `<br><img src="${imageUrl}" alt="generated" />`;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function scrollChatBottom() { chatMessages.scrollTop = chatMessages.scrollHeight; }

        function handleEnter(e) {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault();
                sendMessage(); }
            setTimeout(() => { userInput.style.height = 'auto';
                userInput.style.height = userInput.scrollHeight + 'px'; }, 0);
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;
            addMessage(text, 'user');
            userInput.value = '';
            userInput.style.height = 'auto';
            sendBtn.disabled = true;
            typingIndicator.classList.add('show');
            scrollChatBottom();
            try {
                const reply = await getGeminiResponse(text);
                typingIndicator.classList.remove('show');
                addMessage(reply, 'bot');
            } catch (error) {
                typingIndicator.classList.remove('show');
                addMessage('⚠️ Error. Coba lagi.', 'bot');
            }
            sendBtn.disabled = false;
            scrollChatBottom();
        }

        async function getGeminiResponse(prompt) {
            if (!GEMINI_API_KEY || GEMINI_API_KEY === 'YOUR_GEMINI_API_KEY_HERE') return fallbackAI(prompt);
            const url =
                `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`;
            const resp = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            if (!resp.ok) throw new Error('Gemini error');
            const data = await resp.json();
            return data.candidates[0].content.parts[0].text;
        }

        function fallbackAI(input) {
            const msg = input.toLowerCase();
            if (msg.includes('hai')) return 'Hai! 👋';
            if (msg.includes('apa itu ai')) return 'AI adalah simulasi kecerdasan manusia.';
            if (msg.includes('coding')) return 'Belajar coding dari Python!';
            return ['Menarik! Ceritakan lebih lanjut.', 'Saya masih belajar, coba tanya yang lain.', 'Hmm, saya catat pertanyaanmu.'][Math.floor(Math
                .random() * 3)];
        }

        // ================================================================
        // 4. GENERATE GAMBAR - DIPERBAIKI UNTUK CORS
        // ================================================================
        const imagePrompt = document.getElementById('imagePrompt');
        const generateBtn = document.getElementById('generateBtn');
        const imageResult = document.getElementById('imageResult');
        const imageLoader = document.getElementById('imageLoader');
        const imagePlaceholder = document.getElementById('imagePlaceholder');

        imagePrompt.addEventListener('keydown', (e) => { if (e.key === 'Enter') generateImage(); });

        async function generateImage() {
            const prompt = imagePrompt.value.trim();
            if (!prompt) { alert('Masukkan deskripsi!'); return; }

            imageLoader.classList.add('show');
            imagePlaceholder.style.display = 'none';
            const oldImg = imageResult.querySelector('img');
            if (oldImg) oldImg.remove();
            generateBtn.disabled = true;

            // Daftar model yang akan dicoba (fallback otomatis)
            const models = [
                'stabilityai/stable-diffusion-2-1',
                'runwayml/stable-diffusion-v1-5',
                'prompthero/openjourney'
            ];

            let lastError = null;

            for (const model of models) {
                try {
                    const url = `https://api-inference.huggingface.co/models/${model}`;

                    const response = await fetch(url, {
                        method: 'POST',
                        mode: 'cors', // penting untuk CORS
                        credentials: 'omit', // hindari cookie
                        headers: {
                            'Authorization': `Bearer ${HF_API_KEY}`,
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            inputs: prompt,
                            parameters: { wait_for_model: true }
                        }),
                    });

                    if (!response.ok) {
                        const errText = await response.text();
                        throw new Error(`HTTP ${response.status}: ${errText}`);
                    }

                    const blob = await response.blob();
                    const imageUrl = URL.createObjectURL(blob);

                    const img = document.createElement('img');
                    img.src = imageUrl;
                    img.alt = prompt;
                    imageResult.appendChild(img);
                    imagePlaceholder.style.display = 'none';
                    imageLoader.classList.remove('show');
                    generateBtn.disabled = false;
                    return; // sukses, keluar dari fungsi

                } catch (error) {
                    console.warn(`Model ${model} gagal:`, error);
                    lastError = error;
                    // Lanjut ke model berikutnya
                }
            }

            // Jika semua model gagal
            console.error(lastError);
            imagePlaceholder.innerHTML = `
                        <span class="icon">⚠️</span>
                        <p><strong>Gagal generate:</strong> ${lastError?.message || 'Unknown error'}</p>
                        <p style="font-size:13px; color:#6a6a82;">
                            Semua model mencoba gagal. Cek:
                            <br>1. Koneksi internet
                            <br>2. API Key valid di <a href="https://huggingface.co/settings/tokens" target="_blank" style="color:#a78bfa;">Hugging Face</a>
                            <br>3. Buka <a href="https://huggingface.co/stabilityai/stable-diffusion-2-1" target="_blank" style="color:#a78bfa;">model ini</a> dan klik "Agree" jika perlu
                            <br>4. Refresh halaman, tunggu 1 menit, lalu coba lagi
                        </p>
                    `;
            imagePlaceholder.style.display = 'flex';
            imageLoader.classList.remove('show');
            generateBtn.disabled = false;
        }

        // ================================================================
        // 5. UPLOAD (Bytescale) - sama
        // ================================================================
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const uploadBtn = document.getElementById('uploadBtn');
        const fileList = document.getElementById('fileList');

        uploadBtn.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', (e) => { e.preventDefault();
            dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => { dropZone.classList.remove('dragover'); });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length) handleFiles(e.dataTransfer.files);
        });
        fileInput.addEventListener('change', () => {
            if (fileInput.files.length) { handleFiles(fileInput.files);
                fileInput.value = ''; }
        });

        async function handleFiles(files) {
            if (!BYTESCALE_API_KEY || BYTESCALE_API_KEY === 'public_YOUR_BYTESCALE_KEY_HERE') {
                alert('⚠️ Bytescale API Key belum diisi. Daftar gratis di https://bytescale.com');
                return;
            }
            for (const file of files) {
                const item = createFileItem(file, 'Mengupload...');
                fileList.prepend(item);
                try {
                    const formData = new FormData();
                    formData.append('file', file);
                    const response = await fetch('https://api.bytescale.com/v2/accounts/FILES/uploads/binary', {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${BYTESCALE_API_KEY}` },
                        body: formData,
                    });
                    if (!response.ok) throw new Error('Upload gagal');
                    const data = await response.json();
                    const fileUrl = data.fileUrl || data.url || '';
                    const statusEl = item.querySelector('.status');
                    statusEl.textContent = '✅ Berhasil';
                    statusEl.className = 'status';
                    const preview = item.querySelector('.preview');
                    if (file.type.startsWith('image/') && fileUrl) preview.src = fileUrl;
                    else preview.style.display = 'none';
                    const info = item.querySelector('.info');
                    if (fileUrl) {
                        info.innerHTML =
                            `<div class="name">${file.name}</div><div class="size">${formatSize(file.size)} · <a href="${fileUrl}" target="_blank" style="color:#a78bfa;">Lihat</a></div>`;
                    }
                } catch (error) {
                    const statusEl = item.querySelector('.status');
                    statusEl.textContent = '❌ Gagal';
                    statusEl.className = 'status error';
                }
            }
        }

        function createFileItem(file, statusText) {
            const div = document.createElement('div');
            div.className = 'file-item';
            const isImage = file.type.startsWith('image/');
            const previewUrl = isImage ? URL.createObjectURL(file) : '';
            div.innerHTML = `
                        <img class="preview" src="${previewUrl || ''}" alt="preview" />
                        <div class="info"><div class="name">${file.name}</div><div class="size">${formatSize(file.size)}</div></div>
                        <span class="status">${statusText}</span>
                    `;
            return div;
        }

        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / 1048576).toFixed(1) + ' MB';
        }

        // ================================================================
        // 6. INIT
        // ================================================================
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('userInput').focus();
        });
    </script>

</body>
</html>
